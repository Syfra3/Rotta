name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4

      - name: Install Claude Code
        run: npm install --global @anthropic-ai/claude-code

      - name: Record Claude compatibility evidence
        run: |
          go test ./internal/installer -run '^TestSCN301_InstallGlobalClaudeOrchestratorAndHiddenPhaseAgents$'
          {
            echo "## Claude compatibility verification"
            echo "Claude compatibility verification: PASS"
            echo '```text'
            claude --version
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run verification gate
        run: make verify
